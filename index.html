<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Anthony &amp; Victoria — Wedding Registry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:#FBF7F2;
  color:#3A332E;
  font-family:'Jost',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
::selection{background:#E7C9C4;color:#3A332E;}

/* Lang switcher */
.lang-bar{
  position:fixed;top:18px;right:18px;z-index:80;
  display:flex;gap:4px;padding:5px;
  border-radius:999px;
  background:rgba(253,250,246,0.92);
  backdrop-filter:blur(10px);
  border:1px solid rgba(58,51,46,0.12);
  box-shadow:0 10px 30px -14px rgba(40,30,25,0.35);
}
.lang-btn{
  padding:7px 13px;border-radius:999px;border:none;
  font-family:'Jost',sans-serif;font-size:11px;
  letter-spacing:0.12em;cursor:pointer;
  transition:all .25s;
  background:transparent;color:#8C8077;
}
.lang-btn.active{background:#C0857F;color:#fff;}

/* Hero */
.hero{
  position:relative;height:90vh;min-height:580px;
  display:flex;align-items:center;justify-content:center;
  text-align:center;overflow:hidden;
}
.hero-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center;
}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(40,30,28,0.30),rgba(40,30,28,0.46));
  pointer-events:none;
}
.hero-content{
  position:relative;z-index:2;
  padding:26px;max-width:820px;
}
.hero-eyebrow{
  display:flex;align-items:center;justify-content:center;
  gap:14px;margin-bottom:24px;
}
.hero-eyebrow span.line{width:34px;height:1px;background:rgba(255,255,255,0.55);}
.hero-eyebrow span.text{
  font-size:12px;letter-spacing:0.34em;
  text-transform:uppercase;color:rgba(255,255,255,0.92);
}
.hero h1{
  margin:0;font-family:'Cormorant Garamond',serif;
  font-weight:500;
  font-size:clamp(56px,11vw,148px);
  line-height:0.96;letter-spacing:-0.01em;
  color:#fff;text-shadow:0 2px 30px rgba(0,0,0,0.28);
}
.hero h1 em{font-style:italic;font-weight:400;}
.hero-welcome{
  max-width:558px;margin:30px auto 0;
  color:rgba(255,255,255,0.93);
  font-size:clamp(15px,1.5vw,18px);
  line-height:1.75;font-weight:300;
}
.hero-scroll{
  position:absolute;bottom:26px;left:50%;
  transform:translateX(-50%);z-index:2;
  display:flex;flex-direction:column;
  align-items:center;gap:8px;pointer-events:none;
}
.hero-scroll span.label{
  font-size:9px;letter-spacing:0.3em;
  text-transform:uppercase;color:rgba(255,255,255,0.7);
}
.hero-scroll span.bar{
  width:1px;height:34px;
  background:rgba(255,255,255,0.55);
  animation:avCue 2.4s ease-in-out infinite;
}
@keyframes avCue{
  0%{transform:translateY(0);opacity:.5;}
  50%{transform:translateY(8px);opacity:1;}
  100%{transform:translateY(0);opacity:.5;}
}

/* Registry header */
.registry-head{
  max-width:1180px;margin:0 auto;
  padding:clamp(58px,8vw,112px) 24px 6px;
  text-align:center;
}
.eyebrow{
  font-size:11px;letter-spacing:0.3em;
  text-transform:uppercase;color:#B79155;
  margin-bottom:20px;
}
.registry-head h2{
  margin:0;font-family:'Cormorant Garamond',serif;
  font-weight:500;
  font-size:clamp(36px,5vw,64px);line-height:1.04;
}
.registry-intro{
  max-width:560px;margin:22px auto 0;
  color:#8C8077;font-size:16px;line-height:1.8;font-weight:300;
}

/* Progress */
.progress-wrap{
  max-width:680px;margin:44px auto 0;
}
.progress-row{
  display:flex;align-items:baseline;
  justify-content:space-between;gap:16px;
}
.progress-count{
  font-family:'Cormorant Garamond',serif;font-size:26px;
}
.progress-count small{
  font-family:'Jost',sans-serif;font-size:13px;
  letter-spacing:0.04em;color:#8C8077;font-weight:300;
}
.progress-pct{
  font-size:12px;letter-spacing:0.16em;
  text-transform:uppercase;color:#B79155;
}
.progress-track{
  margin-top:14px;height:6px;border-radius:999px;
  background:#f1ebe3;
  border:1px solid rgba(58,51,46,0.12);overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:999px;
  background:linear-gradient(90deg,#B79155,#C0857F);
  transition:width .7s cubic-bezier(.2,.7,.2,1);
}
.filter-wrap{
  margin-top:22px;display:flex;justify-content:center;
}
.filter-btn{
  display:inline-flex;align-items:center;gap:9px;
  padding:9px 18px;border-radius:999px;
  border:1px solid rgba(58,51,46,0.12);
  font-family:'Jost',sans-serif;font-size:11px;
  letter-spacing:0.14em;text-transform:uppercase;
  cursor:pointer;transition:all .25s;
  background:transparent;color:#8C8077;
}
.filter-btn.active{background:#C0857F;color:#fff;border-color:#C0857F;}
.filter-btn .dot{
  width:7px;height:7px;border-radius:50%;
  background:currentColor;display:inline-block;flex-shrink:0;
}

/* Gift grid */
.gift-grid{
  max-width:1180px;margin:0 auto;
  padding:clamp(34px,5vw,56px) 24px 90px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:clamp(20px,2.5vw,34px);
}
.gift-card{
  position:relative;
  background:#fff;
  border:1px solid rgba(58,51,46,0.12);
  border-radius:16px;overflow:hidden;
  box-shadow:0 18px 50px -28px rgba(60,40,35,0.45);
  display:flex;flex-direction:column;
  transition:transform .45s cubic-bezier(.2,.7,.2,1),box-shadow .45s;
}
.gift-card:hover{
  transform:translateY(-7px);
  box-shadow:0 34px 64px -34px rgba(50,35,30,0.55);
}
.gift-img-wrap{position:relative;}
.gift-img{
  display:block;width:100%;height:236px;
  object-fit:contain;background:#fff;
}
.reserved-badge{
  position:absolute;top:14px;left:14px;z-index:3;
  display:inline-flex;align-items:center;gap:7px;
  background:#fff;color:#C0857F;
  border:1px solid #C0857F;
  padding:6px 12px;border-radius:999px;
  font-size:10px;letter-spacing:0.18em;
  text-transform:uppercase;
  box-shadow:0 6px 18px -10px rgba(0,0,0,0.3);
}
.gift-card.purchased .reserved-badge{display:inline-flex;}
.gift-body{
  padding:22px 22px 24px;
  display:flex;flex-direction:column;gap:14px;flex:1;
}
.gift-name{
  font-family:'Cormorant Garamond',serif;
  font-weight:500;font-size:25px;line-height:1.15;
}
.gift-divider{
  width:30px;height:1px;background:#B79155;margin-top:12px;
}
.gift-actions{
  margin-top:auto;display:flex;
  align-items:center;justify-content:space-between;
  gap:12px;flex-wrap:wrap;
}
.view-link{
  display:inline-flex;align-items:center;gap:8px;
  font-size:12px;letter-spacing:0.13em;
  text-transform:uppercase;color:#3A332E;
  text-decoration:none;
  border-bottom:1px solid #B79155;
  padding-bottom:4px;
  transition:gap .3s,color .3s;
}
.view-link:hover{gap:13px;color:#C0857F;}
.toggle-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:8px 13px;border-radius:999px;
  font-family:'Jost',sans-serif;
  font-size:10px;letter-spacing:0.1em;
  text-transform:uppercase;cursor:pointer;
  transition:all .25s;
  background:transparent;color:#8C8077;
  border:1px solid rgba(58,51,46,0.12);
}
.toggle-btn .dot{
  width:7px;height:7px;border-radius:50%;
  background:currentColor;display:inline-block;flex-shrink:0;
}
.gift-card.purchased .toggle-btn{
  background:#C0857F;color:#fff;border-color:#C0857F;
}

/* Fund section */
.fund-section{
  background:#FAF3EC;
  border-top:1px solid rgba(58,51,46,0.12);
  border-bottom:1px solid rgba(58,51,46,0.12);
  padding:clamp(62px,8vw,116px) 24px;
  text-align:center;
}
.rings{
  display:flex;align-items:center;
  justify-content:center;gap:18px;margin-bottom:28px;
}
.rings .line{width:54px;height:1px;background:rgba(58,51,46,0.2);}
.rings .rings-icon{
  position:relative;width:46px;height:26px;display:inline-block;
}
.rings .rings-icon span{
  position:absolute;top:0;width:26px;height:26px;
  border-radius:50%;
}
.rings .rings-icon span:first-child{left:0;border:1.5px solid #B79155;}
.rings .rings-icon span:last-child{right:0;border:1.5px solid #C0857F;}
.fund-inner{max-width:620px;margin:0 auto;}
.fund-inner h3{
  margin:0;font-family:'Cormorant Garamond',serif;
  font-weight:500;
  font-size:clamp(32px,4.5vw,54px);line-height:1.06;
}
.fund-text{
  max-width:500px;margin:20px auto 30px;
  color:#8C8077;font-size:16px;line-height:1.8;font-weight:300;
}
.fund-cta{
  display:inline-flex;align-items:center;gap:9px;
  padding:14px 28px;border-radius:999px;
  background:#C0857F;color:#fff;text-decoration:none;
  font-size:12px;letter-spacing:0.16em;text-transform:uppercase;
  transition:gap .3s,opacity .3s;
}
.fund-cta:hover{gap:14px;opacity:0.9;}

/* Footer */
footer{
  text-align:center;
  padding:clamp(72px,9vw,132px) 24px 76px;
}
.footer-date{
  margin-top:18px;font-size:12px;letter-spacing:0.2em;
  text-transform:uppercase;color:#B79155;
}
.footer-with-love{
  font-size:12px;letter-spacing:0.26em;
  text-transform:uppercase;color:#8C8077;margin-bottom:14px;
}
.footer-names{
  font-family:'Cormorant Garamond',serif;
  font-weight:500;
  font-size:clamp(40px,6vw,76px);line-height:1;
}
.footer-names em{font-style:italic;font-weight:400;}

/* Scroll animations */
@media (prefers-reduced-motion: no-preference) {
  .reveal{
    opacity:0;transform:translateY(26px);
    transition:opacity .7s ease, transform .7s ease;
  }
  .reveal.visible{opacity:1;transform:none;}
}

/* Hidden */
.gift-card.hidden-card{display:none;}
</style>
</head>

  });

    if (btn) btn.classList.toggle('active', l === lang);
  });
  // Update html lang
  document.documentElement.lang = lang;
  // Update reserved suffix
  updateProgress();
  // Update filter button text
  const filterSpan = document.querySelector('#filter-btn [data-i18n]');
  if (filterSpan) filterSpan.textContent = hideReserved ? T.showAll : T.hide;
  // Re-render gift names and button labels
  renderGiftLabels();
}

function setLang(l) {
  lang = l;
  try { localStorage.setItem('av-registry-lang', l); } catch(e) {}
  applyLang();
}

function togglePurchased(id) {
  if (purchased[id]) delete purchased[id];
  else purchased[id] = true;
  try { localStorage.setItem('av-registry-purchased', JSON.stringify(purchased)); } catch(e) {}
  updateProgress();
  renderGiftLabels();
  if (hideReserved) applyFilter();
}

function toggleHide() {
  hideReserved = !hideReserved;
  const btn = document.getElementById('filter-btn');
  const T = STRINGS[lang] || STRINGS.fr;
  const span = btn.querySelector('[data-i18n]');
  if (span) span.textContent = hideReserved ? T.showAll : T.hide;
  btn.classList.toggle('active', hideReserved);
  applyFilter();
}

function applyFilter() {
  document.querySelectorAll('.gift-card').forEach(card => {
    const id = parseInt(card.dataset.id);
    const isPurchased = !!purchased[id];
    card.classList.toggle('hidden-card', hideReserved && isPurchased);
  });
}

function updateProgress() {
  const T = STRINGS[lang] || STRINGS.fr;
  const total = GIFTS.length;
  const reservedCount = Object.keys(purchased).filter(k => purchased[k]).length;
  const pct = total ? Math.round((reservedCount / total) * 100) : 0;
  document.getElementById('reserved-count').textContent = reservedCount;
  document.getElementById('reserved-suffix').textContent = T.reservedSuffix.replace('{n}', total);
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function renderGiftLabels() {
  const T = STRINGS[lang] || STRINGS.fr;
  GIFTS.forEach(g => {
    const card = document.querySelector(`.gift-card[data-id="${g.id}"]`);
    if (!card) return;
    const isPurchased = !!purchased[g.id];
    card.classList.toggle('purchased', isPurchased);
    const nameEl = card.querySelector('.gift-name');
    if (nameEl) nameEl.textContent = g.names[lang] || g.names.fr;
    const toggleBtn = card.querySelector('.toggle-btn span:last-child');
    if (toggleBtn) toggleBtn.textContent = isPurchased ? T.reservedTag : T.mark;
    const viewLink = card.querySelector('.view-link');
    if (viewLink) {
      const txt = viewLink.querySelector('.link-text');
      if (txt) txt.textContent = T.viewGift;
    }
    const badge = card.querySelector('.reserved-badge');
    if (badge) {
      badge.style.display = isPurchased ? 'inline-flex' : 'none';
      const bText = badge.querySelector('.badge-text');
      if (bText) bText.textContent = '✓ ' + T.reservedTag;
    }
  });
}

function buildGrid() {
  const grid = document.getElementById('gift-grid');
  grid.innerHTML = '';
  GIFTS.forEach((g, i) => {
    const imgSrc = IMAGES[g.id] || '';
    const card = document.createElement('div');
    card.className = 'gift-card reveal';
    card.dataset.id = g.id;
    card.innerHTML = `
      <div class="gift-img-wrap">
        <img class="gift-img" src="${imgSrc}" alt="">
        <div class="reserved-badge" style="display:none">
          <span class="badge-text">✓ Réservé</span>
        </div>
      </div>
      <div class="gift-body">
        <div>
          <div class="gift-name">${g.names[lang] || g.names.fr}</div>
          <div class="gift-divider"></div>
        </div>
        <div class="gift-actions">
          <a class="view-link" href="${g.url}" target="_blank" rel="noopener noreferrer">
            <span class="link-text">Voir le cadeau</span> →
          </a>
          <button class="toggle-btn" onclick="togglePurchased(${g.id})">
            <span class="dot"></span>
            <span>Marquer comme acheté</span>
          </button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

// Scroll reveal
function initReveal() {
  if (!('IntersectionObserver' in window)) {
    document.querySelectorAll('.reveal').forEach(el => el.classList.add('visible'));
    return;
  }
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, {threshold: 0.06});
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

// Init
buildGrid();
applyLang();
updateProgress();
renderGiftLabels();
initReveal();
</script>
</body>
</html>
