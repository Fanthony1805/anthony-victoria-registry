<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Anthony &amp; Victoria Registry</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:#FBF7F2;color:#3A332E;font-family:'Jost',system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
.header{background:#fff;border-bottom:1px solid rgba(58,51,46,0.12);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;}
.header-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:500;}
.header-sub{font-size:12px;color:#8C8077;letter-spacing:0.12em;text-transform:uppercase;}
.back-link{font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#B79155;text-decoration:none;border-bottom:1px solid #B79155;padding-bottom:2px;}
/* Login */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.login-card{background:#fff;border:1px solid rgba(58,51,46,0.12);border-radius:16px;padding:40px 36px;max-width:380px;width:100%;text-align:center;box-shadow:0 18px 50px -28px rgba(60,40,35,0.4);}
.login-card h2{font-family:'Cormorant Garamond',serif;font-weight:500;font-size:32px;margin:0 0 8px;}
.login-card p{color:#8C8077;font-size:14px;margin:0 0 28px;}
.login-card input{width:100%;padding:12px 16px;border:1px solid rgba(58,51,46,0.2);border-radius:8px;font-family:'Jost',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
.login-card input:focus{border-color:#C0857F;}
.login-card button{margin-top:14px;width:100%;padding:13px;border-radius:999px;background:#C0857F;color:#fff;border:none;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;transition:opacity .2s;}
.login-card button:hover{opacity:.88;}
.login-error{color:#C0857F;font-size:13px;margin-top:10px;display:none;}
/* Dashboard */
#dashboard{display:none;padding:32px;}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;margin-bottom:36px;}
.stat-card{background:#fff;border:1px solid rgba(58,51,46,0.12);border-radius:12px;padding:22px 24px;}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:500;line-height:1;color:#B79155;}
.stat-label{font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:#8C8077;margin-top:6px;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;margin:0 0 20px;}
table{width:100%;border-collapse:collapse;background:#fff;border:1px solid rgba(58,51,46,0.12);border-radius:12px;overflow:hidden;}
thead{background:#FAF3EC;}
th{padding:14px 18px;text-align:left;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#8C8077;font-weight:400;}
td{padding:16px 18px;border-top:1px solid rgba(58,51,46,0.08);font-size:14px;vertical-align:top;}
tr:hover td{background:#FDFAF6;}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;}
.badge-manual{background:#E7C9C4;color:#8C4A42;}
.badge-amazon{background:#E8F0D8;color:#4A6A22;}
.gift-name-cell{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;}
.buyer-email{font-size:12px;color:#8C8077;margin-top:3px;}
.message-cell{color:#5A4E47;font-style:italic;font-size:13px;}
.date-cell{color:#8C8077;font-size:13px;white-space:nowrap;}
.empty-state{text-align:center;padding:60px 24px;color:#8C8077;}
.remaining-section{margin-top:40px;}
.remaining-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-top:16px;}
.remaining-item{background:#fff;border:1px solid rgba(58,51,46,0.12);border-radius:10px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.remaining-name{font-family:'Cormorant Garamond',serif;font-size:17px;}
.remaining-num{font-size:11px;color:#8C8077;background:#F1EBE3;padding:2px 8px;border-radius:999px;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2>Anthony &amp; Victoria</h2>
    <p>Page d'administration — accès privé</p>
    <input type="password" id="pwd-input" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Accéder</button>
    <div class="login-error" id="login-error">Mot de passe incorrect</div>
  </div>
</div>

<div id="dashboard">
  <div class="header">
    <div>
      <div class="header-title">Anthony <em style="font-style:italic;font-weight:400;">&amp;</em> Victoria</div>
      <div class="header-sub">Tableau de bord — Liste de mariage</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <a href="/" class="back-link">← Voir le site</a>
      <button onclick="resetDB()" style="padding:8px 16px;border-radius:999px;background:transparent;border:1px solid #C0857F;color:#C0857F;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;" id="reset-btn">Réinitialiser la DB</button>
    </div>
  </div>

  <div style="padding:32px;">
    <div class="stats" id="stats"></div>

    <div class="section-title">Cadeaux réservés</div>
    <div id="purchases-table-wrap">
      <div class="empty-state">Chargement…</div>
    </div>

    <div class="remaining-section">
      <div class="section-title">Cadeaux encore disponibles</div>
      <div class="remaining-grid" id="remaining-grid"></div>
    </div>
  </div>
</div>

<script>
const GIFT_NAMES = {
  1:'Aspirateur balai Shark',2:'Gants de cuisine KitchenAid',3:'Nettoyeur taches BISSELL',
  4:'Chauffe-plat électrique iTRUSOU',5:'Étagères métalliques CEYIRO (x2)',6:'Rangement chaussures SONGMICS',
  7:'Distributeur canettes réfrigérateur',8:'Boîte charcuterie Mepal Modula',9:'Cuiseur à riz vintage',
  10:'Imprimante étiquettes Phomemo',11:'Friteuse nomade Ninja CRISPi',12:'Store brise-vue rétractable',
  13:'Colonne de rangement 5five',14:'Colonne salle de bain HOMCOM',15:'Colonne bambou Vicco Liora',
  16:'Cuillères doseuses 9 pièces',17:'Ustensiles de cuisine en teck — 10 pièces',18:'Aspirateur balai Dreame R10',
  19:'Blender SMEG',20:'Machine à expresso SMEG',21:'Robot pâtissier SMEG',22:'Bloc à couteaux SMEG'
};
const TOTAL = 22;

let adminPwd = '';

async function resetDB() {
  if (!confirm('Supprimer toutes les réservations ? Cette action est irréversible.')) return;
  const btn = document.getElementById('reset-btn');
  btn.textContent = 'Suppression…';
  btn.disabled = true;
  const res = await fetch('/api/reset-db', {
    method: 'POST',
    headers: { 'x-admin-password': adminPwd },
  });
  if (res.ok) {
    btn.textContent = 'Réinitialiser la DB';
    btn.disabled = false;
    loadData();
  } else {
    btn.textContent = 'Erreur';
    btn.disabled = false;
  }
}

function doLogin() {
  const v = document.getElementById('pwd-input').value;
  if (!v) return;
  adminPwd = v;
  loadData();
}

async function loadData() {
  const res = await fetch(`/api/purchases?pwd=${encodeURIComponent(adminPwd)}`);
  if (res.status === 401) {
    document.getElementById('login-error').style.display = 'block';
    return;
  }
  const rows = await res.json();
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  render(rows);
}

function render(rows) {
  const purchasedIds = new Set(rows.map(r => r.gift_id));

  // Stats
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-num">${rows.length}</div><div class="stat-label">Cadeaux réservés</div></div>
    <div class="stat-card"><div class="stat-num">${TOTAL - purchasedIds.size}</div><div class="stat-label">Encore disponibles</div></div>
    <div class="stat-card"><div class="stat-num">${Math.round(purchasedIds.size/TOTAL*100)}%</div><div class="stat-label">Liste complétée</div></div>
    <div class="stat-card"><div class="stat-num">${rows.filter(r=>r.buyer_email).length}</div><div class="stat-label">Avec email</div></div>
  `;

  // Purchases table
  if (rows.length === 0) {
    document.getElementById('purchases-table-wrap').innerHTML = '<div class="empty-state">Aucun cadeau réservé pour l\'instant.</div>';
  } else {
    const tableRows = rows.map(r => {
      const d = new Date(r.purchased_at);
      const dateStr = d.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
      const badge = r.source === 'amazon'
        ? '<span class="badge badge-amazon">Amazon</span>'
        : '<span class="badge badge-manual">Site</span>';
      return `<tr>
        <td><div class="gift-name-cell">${GIFT_NAMES[r.gift_id]||'#'+r.gift_id}</div></td>
        <td>${r.buyer_name}${r.buyer_email?`<div class="buyer-email">${r.buyer_email}</div>`:''}</td>
        <td class="message-cell">${r.message||'—'}</td>
        <td>${badge}</td>
        <td class="date-cell">${dateStr}</td>
      </tr>`;
    }).join('');
    document.getElementById('purchases-table-wrap').innerHTML = `
      <table>
        <thead><tr><th>Cadeau</th><th>Offert par</th><th>Message</th><th>Via</th><th>Date</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>`;
  }

  // Remaining items
  const remaining = Object.entries(GIFT_NAMES).filter(([id]) => !purchasedIds.has(Number(id)));
  document.getElementById('remaining-grid').innerHTML = remaining.map(([id, name]) =>
    `<div class="remaining-item"><span class="remaining-name">${name}</span><span class="remaining-num">#${id}</span></div>`
  ).join('');
}
</script>
</body>
</html>
